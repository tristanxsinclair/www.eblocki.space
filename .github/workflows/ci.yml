name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify product
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Proof UI token scan
        run: npm run test:proof-ui-tokens

      - name: Build
        run: npm run build

      - name: Bundle-size guardrail (desktop UI regression check)
        run: npm run perf:bundle-size

      - name: Lint Eblocki touched surfaces
        run: npm run lint:eblocki

      - name: Smoke built SPA routes
        run: |
          npm run preview -- --host 127.0.0.1 --port 4172 --strictPort > /tmp/eblocki-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true; wait $PREVIEW_PID 2>/dev/null || true' EXIT
          ROUTE_SMOKE_BASE_URL=http://127.0.0.1:4172 npm run smoke:routes

      - name: Lighthouse desktop performance thresholds
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npx --yes @lhci/cli@0.15.x autorun --config=./lighthouserc.json
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=moderate
