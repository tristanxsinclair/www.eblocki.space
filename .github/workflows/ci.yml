name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify product
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests
        run: npm run test

      - name: Proof UI token scan
        run: npm run test:proof-ui-tokens

      - name: Build
        run: npm run build

      - name: Bundle-size guardrail (desktop UI regression check)
        run: npm run perf:bundle-size

      - name: Lint Eblocki touched surfaces
        run: npm run lint:eblocki

      - name: Smoke built SPA routes
        run: |
          npm run preview -- --host 127.0.0.1 --port 4172 --strictPort > /tmp/eblocki-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true; wait $PREVIEW_PID 2>/dev/null || true' EXIT
          ROUTE_SMOKE_BASE_URL=http://127.0.0.1:4172 npm run smoke:routes

      - name: Render public routes
        run: |
          export CHROME_PATH="$(node -e 'const { chromium } = require("playwright"); console.log(chromium.executablePath())')"
          node scripts/render-public-routes.mjs

      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=moderate
