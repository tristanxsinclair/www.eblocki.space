name: E2E - System Forge

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright (mobile-chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: |
          npx vite preview --port 8080 --strictPort > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..30}; do
            if curl -sSf http://localhost:8080 > /dev/null; then
              echo "Preview server up"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          cat preview.log
          exit 1

      - name: Run Playwright E2E
        env:
          E2E_BASE_URL: http://localhost:8080
          CI: 'true'
          # Supabase session env vars (LOVABLE_BROWSER_SUPABASE_*) are not set in CI.
          # The auth fixture self-skips authenticated specs so the job stays green
          # until a signed-in session is wired in. Add them as GitHub Actions
          # secrets to enable full E2E coverage on PRs.
        # Reporters and retries are configured in playwright.config.ts based on CI env.
        run: npx playwright test

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces, screenshots, and videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload preview server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-server-log
          path: preview.log
          retention-days: 7